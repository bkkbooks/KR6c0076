front:
  text: 自序原夫理根於性性必有所受之途形區於命命必有收造之府真一之雌握筌藏領良彌邃矣是以聖靈言道眇追聲臭之無覺德開宗捫絶色空之寂自有入無自無而入無無猶之萬象生於太極太極生於無極本末精粗理跡相並循模歸化候亦隨之在昔先民闡之鑿矣𮨇入無而不能出有非脫頴之妙也無極而不能立極非凝獨之用也故體無者又貴徹於無非無而宗極者又環通乎物物極物物極則一中非中而隨時皆中已發之和即未發之中體用一貫矣無非無則執空非空而色相歸空不生之相即不滅之空根塵無二矣大道所由同源而淵修亦遵共轍也慨自淳風既邈埈氣彌氛建標之立替真於岸分逐影之馳矜得於樊籬梟智之儒入室而摻戈流遁之夫抱礐而衒玉緣使真言滯於競辨宗諦雜於奇裘是否亂名實乖僭贋璞盈前精華愈竭不惟姬孔失其傳而迦文亦罕其嫡嗚呼以水救水以火救火命之益多疇能定乎蓋心無垢淨猶水無清濁珠沉之則清象入之則濁清濁雖同一水而不得言水外無象無珠則所以澄之擾之者即心也非心也非心也即心也此金剛般若波羅蜜經所以勤勤懇懇於降心無住而為萬法之宗也第守法而不明無法則本覺未圓覺由識昧故又歸宅乎捨法然捨法而不先修行則因地不立果亦難成故又發藥於斷滅夫斷滅者執空以為空見空而不見法空即纍法不斷滅者隨所見而皆空以空治見見即圓空所以善捨得捨捨為登岸之津梁而托捨求捨捨即沉淪之墜石善空成見見即明鏡之加磨而滅見為空空猶暗室之求照故曰一切有為法如夢幻燈翳蓋自有為以歸空而非滅為以貌空至人靈響雙理環結雲章昺較若列眉無如世之說者但曰無為已耳空相已耳於是真心向學而失之者以寂滅為空以了獨為無為名心向學而失之者以不滅為空以任放為無為至於江湖日下而刑名貨利結權惎傲禽業獸毒溷聚叨淫無不可自標以菩薩之目矣嗟夫佛之所以度人者度人於出生死之門也降心以淨其塵無住以精其進布施以濟其功空相以究其竟四者不可邊舉若能淨能進而不思究竟半途之廢也直取究竟而不必精進不揣其本而齊其末也喜施喜度而不自了義下品之檀也能自了義而不能利他覺他非無上菩提也梅子熟有時風靜水自定救此弊者莫若專明解行解行深到究竟自圓豫生也鈍不能有知然末法之懼豈無憬乎偶因持誦真經率爾遂多筌蹄既不能超所見于語言文字之外抑且贅其喙於章句演說之間蓋絶理而談宗則吾豈敢若因文以顯義或有取焉愚者千慮必有一得芻蕘之言聖人所擇則勺海一掬之勤鋪地一毛之效或亦覺皇所在宥哉第較諸舊疏杜撰實多知我罪我當必相半故不敢倚重于名題并不敢借光於碩譽良懼兼葭冠玉涉纍鴻宗聊自述其所見如此以俟十方慧眼論定云南湖圃人徐發考異按金經有五譯而世之誦者秦譯也然近本多與古本不同要亦歷有增改以愚觀之總不如古文之妙況靈跡真源何可增改耶嘗聞老僧說誦金經者功德最神但錯一字即無驗可不慎諸今悉遵趙子昂石本刊録其與近本不同及諸家有考證者並存於此第二分應云何住今本作云何應住按住字已非實相不當更添應字然會譯原本秦周俱作應住惟魏譯作應云何住則趙刻亦非無所本也十三分今本或少是名般若波羅蜜七字而趙刻有之然會譯本實無此七字今亦以趙本理近世多從之故仍存十四分應生瞋恨今本或作瞋眼按會譯并趙刻俱作恨忍辱波羅蜜如來說非忍辱波羅蜜下今本又有是名忍辱波羅蜜七字會譯并趙刻俱無按第一波羅蜜句是結上語故義全忍辱波羅蜜句是啓下語故不全不當添足今依趙本為利益一切衆生下今本多一故字會譯趙刻俱無今刪去十七分佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者今本無若字趙刻宗泐奉敕注皆有此是論現在故有若字語氣甚活當從二十四分百分不及一下今本又有一百字或於千字下多一分字魏譯趙刻俱無句讀不明有礙理解二十六分爾時世尊而說偈言周魏譯皆作言字今本作偈曰係俗筆所改依趙本作言字三十分是微塵衆寧為多不下今本添須菩提言四字會譯趙本俱無若全經則字今本多改即字凡二十餘見則即二義雖不甚遠而語氣微有不同即乃已然之詞則乃未然之詞如轉輪聖王則是如來語氣甚活改作即字便一板呆煞所以有輪王實同如來之誤解他如若心取相則為著我人衆生壽者如然燈佛則不與我受記如實有佛則不說是微塵衆諸則字俱斷斷不可改其餘雖義或兩可而雅俗自別俱依三譯趙本改正按諸譯不同甚多惟秦譯最簡出之最先以後漸增漸詳蓋創者難為力而繼者易為工理固然耳顧增華飾美不如還淳反朴之得其真所以世本獨尊秦譯良非無謂今考異文亦不能盡述獨魏譯十二分第頗簡要足為章句發明并附參考如是我聞至敷坐而坐為序分第一時長老須菩提至善付囑諸菩薩為護念付囑分第二世尊善男子至願樂欲聞為住分第三佛告須菩提至但應如所教住為如實修行分第四須菩提於意云何至則見如來為如來非有為分第五須菩提白佛言至一切賢聖皆以無為法而有差別為我空法分第六須菩提於意云何若人滿三千大千至此法無實無虗為具足功德較量分第七須菩提若菩薩心住於法而行布施至何況書寫受持讀誦為人解說為真如分第八須菩提以要言之至果報亦不可思議為利益分第九爾時須菩提白佛言至如如不動為斷疑分第十四句偈言為不住道分第十一佛說是經已下流通分第十二此十二分第比道安為詳比昭明為略頗得綱領而須菩提重問以後皆作斷疑尤為正見又十七分須菩提重問善男子善女人發阿耨多羅三藐三菩提心魏譯於前則曰云何菩薩大乘中發阿耨多羅三藐三菩提心於後但曰云何菩薩發阿耨多羅三藐三菩提心除去大乘中三字顯有淺深二義蓋所謂大乘者即如來法也後問不言大乘者顯就現在修菩薩行言也其文亦足為三世因緣一證豫於既脫稿之後得閲此本頗自幸其不大盩戾于昔人因思袁了凡先生曰看金剛經有不會處但讀各譯自見益為信然又陳真諦譯本云如如不動恆有正說應觀有為法如暗翳燈幻露泡夢電雲所謂恆有正說猶云恆言中有成說也豫謂末後四句乃相傳古偈此亦一證既成書錢登明兄示豫三譯本始得見之又中峰禪師略義云如來於第四時說般若經六百卷金剛經乃其一也議者於六百卷之綱目以融通淘汰四字攝之蓋如來嘗於第二時在鹿苑轉四諦法輪證諸小乘入有餘涅槃以未稱本懷由是第三時維摩彈斥使其耻小慕大然後廣說般若一味真空專為小乘人融其所執通其所滯淘之汰之如滌穢器便之清淨然後以上乘圓頓甘露之味注之但金剛經局於文約幾不能句讀義意深邃寄之六百卷間於中或有不能通處正不必致疑但存一念深信久當自解發按所謂一味真空專為小乘人融其所執通其所滯此語足盡金經全蘊蓋小乘人與初學佛人不同其功行已深特未造大乘耳正所謂有為法也故曰一切有為法應作如是觀其論尤足為四句偈發明因思昔趙吳興師事中峰手書此經施師展讀今石刻是也諒其中字句經二巨眼決無謬誤則豫之考異悉遵石本改正亦足憲矣又第六分無法相亦無非法相下集解謂舊本又有無相亦非無相句故彌勒偈曰依八八義則今按留支譯曰無法相亦非無法相無相亦非無相真諦譯曰無法想無非法想無想無非想諸譯同一轍則舊本確矣然趙刻亦無相沿既久不敢擅增但余詳味末後八分如佛雙收實有此二義蓋就過去如來言則曰相就現在佛言則曰法理即一揆文實異趣故余于章句中分別出之蓋此二語實提綱挈領之要也大約佛語必舉全體而後德易墮邊見故刪去之此即中峰所謂不可通解處是也譬如孔子只重一仁孟子復兼舉義說一仁而義自在其中兼舉義則仁反似非全德此聖賢地位有不同處後之學者自須究極根抵不可以耳食師說便依樣畫葫蘆也又三十二分若有善男子善女人發菩薩心者薩字俗本多誤作提字按會譯原本趙刻石本宗泐奉敕注本雲棲鎞論皆薩字蓋此句正結完十七分空生為現在祇園會上善男子善女人問菩薩行意故前於實義則既曰菩薩亦如是又曰通達無我法者名真是菩薩於福德則曰此菩薩勝前菩薩所得福德至此盡處則又曰若善男子善女人發菩薩心者前後照應脈絡如線若改作菩提便泛濫無緒此章法所以不可不明也說略總論十則佛法有宗教二門要其竟訖原屬一歸如儒家生知學知同歸于聖耳今宗門只說頓悟無論不須注腳並經亦儘饒舌豫思楞嚴謂精覺妙明非因非緣亦非自然則不惟教不必立宗亦何有然釋迦升座文殊舉棓五百外道見影而走為何復有許多言教至三千五百餘卷蓋佛性人人所具而鈍根利根萬有不同故楞嚴又曰理則頓悟事非頓除所以見道品後畢竟又說修道猶如中庸誠明明誠不可偏廢乃有三無漏學四種律儀等序以引進之要之明覺雖圓非言教不為功時雨之化有其候也若執途人而名之頓悟彼岸焉得有許許跡耶近日宗門頗號極盛而教法訖以不明良由取捷徑而厭勞功究之捷取原無到岸而厭勞徒自喪真高者罔罔半生盡成魔障劣者緣塵反縛造業益深故豫茲集務從粗淺訓詁但使初學易知尋門得路自能升堂入室行積功深自能了空悟徹不徒為言荃添蛇足要使忘言者弗墜八無相若大智龍象衣中有珠固無藉此螢照矣金經注家無慮數百種鈞天廣樂已張何復須下里巴人然有不能自已者竊見從來注疏皆以禪宗參話舊德舉義編綴成書兼之昭明三十二分蔽錮眼光即有翻脫窠臼掃却畦町而零雜瑣碎不求章脉不辨前後淺深故取義愈博而經旨愈晦夫舉義參話猶儒家時文制萟也隨拈一題便有一番議論要非到家不得本文真面目譬之時萟摘段做講說誰能理會題神書氣耶豫素性讀書不喜注疏故茲集亦專取經文諷誦潛思默悟者數年不意經中自有天然層級問答因緣即彌勒偈亦已指出奈從來講家因循成說直取空相并彌勒偈語亦多錯解不知此經原從有相說到空相借須菩提三世異相之疑說到三世一法之無相專在如來與佛有過去現在分別相故十七分後空生重問佛法而佛言無我法以破其異相今說者俱不致分別所以後來種種疑竇種種敲剝俱似重衍相見如來之問有四層福德較勝之例有九級拙者再四申理而不覺其冗巧者曲意穿鑿而不覺其謬將迦現一番問答淺深源委全然埋沒譬之掩塞門路夸言堂奧豈是真見此豫所為不能自已也今姑略標一二領要取正法眼餘見說中蓋非徒好異以顯前人之疏實恐因循以重後人之誤耳如來舊解但曰真性自如如理而來不指何人說者則謂佛即如來如來即佛經旨空相何必分疏豫謂此是究竟實理若詮注演說則如來本釋迦佛因地法身號乃過去相也故此全經須菩提所稱如來意中實指佛而佛却就因地答故屢稱如來所說如來常說如來滅後昔在燃燈佛所與我授記當得作佛蓋然燈亦號如來也圓覺經文殊師利菩薩白佛言大悲世尊願為此會說於如來本起因地法行使未來衆生求大乘者不墮邪見所謂因地亦指過去此經特省文耳所以佛首答降心次答無住又次答見如來三問三答前後圓徹佛大法段實止于此要此乃千古如來相傳心法故佛亦自名為經至五分以下乃又因須菩提問信心奉持而推廣言之曰無取曰無說曰無得曰第一希有曰忍辱布施曰消滅罪業皆不出降心修行無住無相之義此豫所謂如來法者實指過去之如來也然須菩提本以如來稱佛而佛不自認焉知佛與如來不別有法乎於是十七分又親切為現在祇園會中諸菩薩問現在佛之法佛則以無我法破之我字雖從四相中來而語意實對照過去如來然無我正是我與如來無異相處故即以然燈授記作佛證之又以三世心不可得闡之下又以佛與如來兩相比竝問之蓋至此佛始和盤托出自認為如來而須菩提亦了然佛即如來三世無二相矣於是更將未來衆生申問一番而三世一法粲然大備末後段段將佛與如來三世竝勘到底盡歸無相一法此祇園會上問答因緣真面目也要自異相說到一相故曰不一亦不異由三世說到一法故曰如是知如是見如是信解不生法相此正所謂三世如來也今諸家混混不得不辨四句偈一切有為法四句是也蓋此偈乃自古流傳之偈人所稔聞稔知故於末後出之其義實包佛法全體後人錯解有為法三字但以一空詮之又倒裝在後故忽而疑之不知佛法不墮一邊楞嚴曰空心現前長斷滅解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯是人則破佛律儀誤入人罪當從淪墜涅槃經曰一切衆生不退佛性名之為有決定得故智度論曰無智人聞空解脫門不修功德但欲得空是為邪見斷諸善根蓋由不得般若波羅蜜法故入阿毗曇門則墮有中入空門則墮無中入蜫勒門則墮有無中寶雲經曰非無人故名之曰空但法自空非色滅空若以得空而依于空佛說是人則為退墮善男子寧起我見積如須彌山莫以空見起增上慢所以者何一切諸見以空得脫若起空見則不可治故宗通曰應云何住所謂住者非如凡夫住于相亦非如二乘人住于空乃住于真如實際非假非空中道諦也云何降伏其心所謂降伏者非如凡夫所修按伏六識亦非如二乘所修斷滅七識乃八識心田微細習氣以真如熏之令轉識成智譬降賊衆為良民此正所謂有為法也蓋佛法實非一空所了故全經皆從有法說到無法相末後又明白說出不作斷滅相所以取喻六事六事皆自有入無佛法亦自有為而入無為故曰一切有為法若經中所謂降心無住信心奉持第一希有忍辱布施應無住而生其心成於忍修一切善法不作斷滅相持於此經為人演說皆所謂有為法也而皆底于無法相故曰應作如是觀此即所謂無餘涅槃乃真空也今說者將有為法三字誤作衆生界內遷流造作等解不思彌勒偈曰於有為法中得無垢自在明明指出中字得字若舍法而求空乃頑空非真空矣豈此偈正義耶豫看一部金經千言萬語說來只了得此偈此義故將何以故一句接出明是憲章祖述相傳要訣乃有謂二十六分四句者不悟二十六分上文有爾時世尊而說偈言等字則為世尊問答間一時所唱可知何得預先道著況二十六分後獨不可持誦演說乎又有謂我相人相四句者不知釋偈原有體裁四種一阿耨窣覩婆二伽陀三祗夜四縕馱南初皆以三十二字為一偈蓋即古體四言八句也後漸變而或五言或七言則偈自有偈體若四相等句為偈何處不可為偈而但稱四句乎至有以金剛般若波羅蜜經八字分作四句者有以四句詮義究竟便稱偈者又有謂一句二句三句乃至四句及十百千句者更為穿鑿竟不知牟尼珠光自現空中而無人肯信也過去心不可得現在心不可得未來心不可得三句乃全經關鍵正因空生重問有分別相故以三世心皆不可得破之所以歷敘五眼層層說來要知三世世界衆生諸心甚是難知而佛悉知故為奇特若今解者謂一日一時中有此三種心援引未曾有經作證不知未曾有經妙吉祥菩薩救度殺業人要見一念轉頭迅速成佛之意故就一時中分別過去現在未來引人起信若此經從上佛法無我來與一時三心何涉若一時中三心何必遠取五眼世界衆生鄭重言之如此況未曾有經本文亦云三世俱不可得故原未嘗專屬一時也至如莊嚴佛土蓋言諸菩薩在如來佛土會上設莊嚴想否或乃謂實實建造殿宇等相身如須彌山王是喻言無可得意故上特加譬如二字明非實語乃或以為實言三丈金身若尊重弟子言如弟子之恭敬佛耳乃倒裝文法釋典極多此例所謂釋教用逆西方語氣如此即如是我聞不也世尊俱是倒裝他如於意云何何以故等句俱倒提逆入全經實理皆然所以四句偈亦留末後蓋語氣如是故文法章法皆如是乃或以為若佛之尊重高弟文殊普賢等不知師之敬弟畢竟不如弟之敬師豈如是甚深經典如佛塔廟而僅同于師之敬弟乎身相之問凡四舉矣如理實見分之身相色身相也乃就過去現在粗跡而探之由淺及深故曰凡所有相皆是虗妄正即境引悟佛機之妙如法受持分之三十二相法身相也法身非耳目所及因世界非世界微塵非微塵以見法身亦非真相此較色身非相已深一層至離色離相分以色身問佛以法身問如來皆非具足而皆名具足則見皆非見而非見皆可名見其理乃圓較前更深若法身非相分可以三十二相觀如來否觀與見不同見在彼觀在我見在外觀在內其義比前三問最為入微故須菩提曰如是如是亦妄想未淨處佛乃以輪王反醒之前後四言身相淺深層次顯有不同而說者一概玄言茫無分別以至須菩提應三十二相觀如來上強添不可字如是如是改作佛語注謂錯簡轉輪聖王則是如來則字改作即字實作輪王與如來一相說又以佛可以具足色身見不配八十種好如來可以具足諸相見不配三十二相俱屬杜撰總由佛與如來三世因緣不曾分別明白致此臆猜後人相沿傳習膏肓深錮遂將迦文正法永為障蔽良可浩歎故豫不揣一一正之知我者釋人矣罪我者釋人矣按須菩提言如是如是以三十二相觀如來魏譯留支實改作不以相成就得見如來佛言如是如是而唐玄奘譯大般若經亦從之然此乃後人報佛恩之意實不必也彌勒偈親承佛教自宜為滴派大宗但句語簡略向以參義視之近者集解鎞論始分繫經文逐段注釋可為印月之妙豫於最後得閲不意三世要義瞭然吻合無如從來說者亦多昧昧不惟分釋經文前後錯誤而三世宗旨更多異解總由成見錮蔽不肯移舟就岸反執認璞為鼠故豫特標簡端并為詮注其略如自身及報恩果報斯不著護存己不施防求于異事此正釋但應如所教住也舊說移作不住色布施不住聲香味觸法布施解與果報義何涉調服彼事中遠離取相心及斷種種疑亦防生成心此正釋可以相見如來不之問也故天親菩薩開列二十七疑亦於此始舊說亦作應如是布施不住于相解尤遠分別有為體防彼成就得三相異體故離彼是如來此正釋若見諸相非相即見如來也以上降心無住布施皆是有為體非真如來以有三相之異也三相化身應身法身離却應化獨顯法身方是真如來此正因空生以現在之佛稱如來故特為指明三身異故以顯三世因緣說者乃以行施住為三相亦謬然其說實本于天親論豫不能無膺托之疑也以後凡言三身不一而足如應化非真佛亦非說法者應化正指過去如來言依彼法身佛故說大身喻法身正指現在佛言蓋以形相論則化身為過去應身為現在法身三世皆有以本體論則應化皆為過去法身為現在故下又曰法身畢竟體非彼相好身言現在之佛雖具法身畢竟是形相非真法相以非相成就非彼法身故言過去如來雖有法身究竟亦非真法所在佛與如來兩兩並說顯有淺深但同歸一非相而又皆不離于法相故下又曰不離于法身彼二非不佛故重說成就亦無二及有所謂二者正並指佛與如來故下又曰如佛法亦然如即如來非若字虗語也今人因不分別此節兩稱具足諸相遂重衍疊出茫無著落又曰非是色身相可比知如來諸佛唯法身轉輪王非佛此以內觀言故三十二相亦為色身淺深益顯又曰去來化身佛如來常不動於是法界處非一亦不異言若來若去若坐若臥乃現在佛應化之相非真如來相然同在法界中則雖不一相面亦不異體矣此去來坐臥實指現在佛言當作應身因與如來對看故曰化身不一正照上二字蓋佛語至此始自明認如來故曰非一亦不異又曰化身示現福非無無盡福諸佛說法時不言是化身蓋說法者皆化身佛無法相故曰不言是化身以上偈語惓惓于化身法身者所謂三相異體故正三世一法之要也其末又彰明較著而總結之曰觀相及於識器身受用事過去現在法亦觀未來世觀相及受用觀于三世事於有為法中得無垢自在蓋統全經三世大旨而言觀相及識正於三世一法中得無垢清淨之真法何等明白曉唱此豫所取獻而自信者不意從來謬誤將總收八句單證為人演說如如不動不知所謂三世及過去現在未來等語竟何著落將彌勒一片苦心親承真諦垂教後人翻成疑障不得不辨昭明三十二分各標四字亦如天親標二十七疑但標大意不循章句故致後人淺觀譏其割裂然摘取四字實得全經淺深要領大非無見地者其是非亦有數條為略言之如第九第十自四果以至如來菩薩莊嚴佛土皆不可取不可得正所謂一切賢聖之差別也文義貫串不可分截而昭明分之後人遂多支離見解又如慧命須菩提以下別起問端明為未來衆生說法而昭明不分出此則昭明之疏也然既為唐僧靈幽感夢所增則昭明時或原無此六十二字耳若第二曰大乘正宗以降心為大乘全體第三日妙行無住標出行字極得要今人以體用合說乃究竟之論而非入門詮解第四如理實見足標全經宗旨所在與後人作開逗疑端者大不同第十八曰一體同觀最得三世一體之義第二十曰離色離相以色身法身二相並列尤有分曉二十六曰法身非相標出法身二字分別更細二十九曰威儀寂靜只就現在釋迦佛說尤得三世因緣三十二日應化非真亦就現在釋迦說觀其取義精確一字不苟俱從全經理會淺深得來絶非近人看東遺西瞻前失後深合三世如來宗旨與彌勒偈實相表裏今人以其分段之疏而并忽其標義之妙妄謂昭明杜撰真鵷雛之嚇鳳蜩鳩之笑鵬也豫初讀之亦頗覺無緒不足恃及既卒業而後知高辛之先我空谷足音矣乃特與彌勒偈並列簡端以資參證其餘諸家足資經文真面目者採録一二總不欲徒夸奧博以欺人耳目也無著天親二菩薩論近世所最宗仰者然其論本從彌勒偈來却不甚相合或亦神聖各自顯其所得不必拘拘於形跡也若二十七斷疑正因經文紆回無跡段落難曉故從立言所以然處尋出有此二十七層發意因緣乃為凡庸衆生當有此種種疑竇故借須菩提問答間開示之今人過於依傍反失經旨并為略舉大意以資參考如初斷求佛行施住相疑言行施乃實實功用何得無相況既曰住是明有地位語凡庸人豈不疑惑故下以如來身相問之蓋身相乃有形之相有形雖變而如來常在則諸有為功用之相皆不足存矣其理不過如此而說者謂行施本為求佛果是相多一層折反覺韜晦至謂行施住即彌勒偈中三相夫行施二字豈得拆作二相耶二斷因果俱深難信疑身相乃因地修行之相如來乃現在法相之果能見非相之相即見如來正因果俱深而說者乃以施住為因佛相為果能修行自然成佛有何難信空生不宜鄙近至此佛雖為庸人說法亦未必淺觀至此三斷無相云何得說疑集解有或云不可以身相見佛此須菩提之言也如何於自語生疑乃謂是恐後來衆生有此疑正不得拘拘可謂善理會天親斷疑者矣愚意所謂無相即上文無法相也既無法相為何諸如來皆說法故下以有得有說不破之說者乃遠追不以相見如來上說且謂釋迦云何于菩提樹下得法說法此處所稱如來何曾佛肯自認耶四斷聲聞得果是取疑因上文云如來所說法皆不可取不可說恐人疑如來大乘不可取下此聲聞乘或有可取故復以四果及佛菩薩一一證之要見皆不可取意說者又添出須陀洹等各取自果如證而說經文本謂四果皆不自得乃添出一層在前耶五斷釋迦然燈取說疑六斷嚴土違於不取疑七斷受得報身有取疑三疑皆歸無取章旨正眼光遠照脉理清徹處則經文是故須菩提諸菩薩摩訶薩以下當作總承六問而說者以三疑分截遂單頂莊嚴所謂轉得三灣便不識前路矣若譬如二字斷當作借喻說而天親實詮得報身乃從實理上會意來今人亦泥看八斷持說未脫苦果疑乃即本章須菩提涕淚悲泣有見于第一希有之法不當復存身命相也故即第一非第一下緊緊接出忍辱非忍辱以醒之而說者乃遠纏外財較勝感得人天苦果等語亦殊葛藤九證無體非因疑無體即彌勒偈所謂道也即指上文如來說一切諸相即是非相又說一切衆生則非衆生二說字即道字即無體恐人疑無體之言不能為證果之因故下以四種實智明之而說者亦遠纏持經較量甚是不必十斷如遍有得無得疑即從上此法無實無虗來無實無虗言上四種智之實相也無體言說有如此實相豈不曰人人皆可有得乎然非心不住而實實行之雖聞言能信究竟何益故下以心住而行心不住而行兩並明之時說又遠纏一切賢聖句不必十一斷住修降伏是我疑無我固是此章章旨然亦就空生重問有異相意故摘出我字言之即從實理處深求細說亦無礙蓋佛語本八面玲瓏不必拘拘所以天親斷疑亦從實理說然須菩提重問不過疑佛與如來有異相耳實無我見在胸中而說者遂謂空生疑意既無我誰為降住誰為修行將我字弔起在前反似穿鑿十二斷佛因是有菩提疑因上文言實無有法恐人不信疑佛於因地不能無菩提也提字今本誤作薩字且為轉解不知上文說有四相則非菩薩所以者何以實無有法發菩提心也此以下皆實明無菩提心豈是薩字耶十三斷無因則無佛法疑言無因地之菩提則亦當無現在之佛法矣故下以如來名字解之蓋不惟現在之佛如是即過去諸如來無不如是故諸如來一切法即佛法至此佛才自明興如來一法故斷疑中亦指出佛法二字十四斷無人度生嚴土疑此人字從上譬如人身長大來大身非大身是人亦非人矣將誰度生將誰莊嚴佛土要知此人字不是人我之人乃即身字意故下即以我當滅度衆生我當莊嚴佛土則非菩薩明之十五斷諸佛不見諸法疑即從上無我法是真菩薩來言度生莊嚴皆非菩薩而無我法者乃真菩薩則豈諸佛皆不見有諸法乎故下以三世心不可得明之蓋心不見三世故佛亦不見諸法正是實理而佛與如來一法隱然在言外矣十六斷福德例心顛倒疑顛倒即世俗心也言三心即不可得豈果報亦不可得乎不能無疑故下以福德無實明之要見福德之多專以無性故則無法菩薩非真無福德而顛倒心亦可以絶矣十七斷無為何有相好疑上文無我無法無二世無福德皆是無為也言既如此諸法皆無何以佛有應化身如來有諸相法身兩並言之顯有淺深庸衆疑情總屬一竇故斷疑亦總言之而說者因渾作一佛看乃強以天親論八十種好三十二相分配不知天親論亦是總言何曾分說八十種好三十二相皆法相也有何分別十八斷無身何以說法疑言既無三身諸相何以又能在世說法蓋欲併說法盡遮于無也故下以無法可說明之天親云若如來色身相好不可得見云何言如來說法正是此意說者乃謂既無色身何處發聲是反將無法要說做有法矣十九斷無法如何修證疑因上文諸法皆無則現在作佛將如何修證此正親切問現在佛也故經文前稱如來此獨稱佛前以有得無得兩意並問此以有得為無得一意專問正為如何修證疑人指開門路乃了義語興前大不同天親論云若如來不得一法名無上菩提如何離上上證轉轉得無上菩提所謂無上菩提正詮以得為無得之為字也眼光極細所謂離上上證轉得無上詮如何修證亦高一層說者又遠纏第三第十等語直作不得菩提說此是句讀不明不知淺深之故二十斷所說無記非因疑上言修一切善法得菩提意持經演說畢竟無記性或非因果所係故下又以福德較勝言之然此亦是巧於生發指引後人處若論經文實段段有福勝作結未必如是拘拘也解者亦當善理會不必泥執二十一斷平等如何度生疑言衆生既是平等皆有佛性何必又要如來度生下乃以實實無度順證之即是首章實無衆生得滅度者解而說者乃謂如來度生實有高下實不平等大非經旨二十二斷以相比知真佛疑以相觀如來譬如認羊作虎豈得比于真知故以輪王醒之觀與見不同故特曰知說者不悟觀見之淺深仍以法身相好等話重衍疊見直是隔靴搔癢二十三斷佛果非關福相疑承上言以相內觀亦可謂微細節目矣猶且不可然則佛果全然無相矣蓋全經敲剝非相至此直是一毫不可著念焉得不起頑空之疑故下急以莫作斷滅相繳定而說者又以福德果報溷入經旨反晦二十四斷化身出現受福疑上文言此菩薩勝前菩薩所得功德言現在諸說法菩薩也故曰化身出現下文佛亦明以現在去來坐臥明之要知現在說法者雖是化身而仍有真法身在則受福不亦宜乎然既曰菩薩宜受福德則化身與法身無異而又曰無所從來亦無所去則法身與化身又不一豈不疑惑故二十五曰斷法身化身一異疑而下文乃以塵界實理明之要見化身法身之異由于塵界起見若塵界之見泯又何法與化之異乎至此佛與如來三世一法已和盤托出而說者猶不悟三世之理不知化身法身等字將何著落觀此則二十七疑實與彌勒偈相表裏而說者只渾渾也二十六斷化身說法無福疑前言菩薩宜受福矣此又何復疑化身無福也蓋因若去若來節宜受福意實在言外不曾明說而下章又言知見信解皆不生法相故復疑化身說法無福也下乃以最勝之福明之然此最勝之福專在不取相之如如何也如來實法如是也此一語實是全經宗旨全部總結下四句偈只詮得此意然恐庸衆不曉但以寂滅為如如故又以何以故跌出偈語明之偈語正從有為法中看出無相不是純任無為一邊故二十七疑曰入寂如何得說疑要見如如與偈義正不是頑空入寂也天親云若諸佛如來常為衆生說法云何如來入涅槃亦是為庸衆人淺見說想說者遂以涅槃二字實詮如如不動乃又以頑空詮偈語不知解疑者正要反其所見若以頑空詮偈語直是入寂不說法矣豈是破疑之意豫看二十七疑專為庸衆人尋門覓路無頭緒中討出頭緒一片苦心段段從上文想來絶無支蔓不意後人過為穿鑿舍近求遠反使經文韜晦真是邢和遭棄寶劒蒙塵不有識者誰能正之豫因諸疑雖是恆情所不免然終非章句段落可分若倚為墻壁反多葛藤故不敢録但近來說家所最宗尚乃逐段分列經文之傍以備學人參照耳佛法不可以文字求乃謂非如文士呫嗶揣摩雕琢字句為工點染聲韻為格也若前後倫次淺深照應乃心聲自然之理即世俗人稍知文義者出言談吐定有一番起訖頭緒前後照應況神靈至聖一指毫端放出天人世界祕文靈象而謂演說般若反僅同于婆子之叮嚀村夫之嘈乎此豫所最不敢信者蓮池云金剛文字似重非重不重而重極難注腳金剛正眼云諸家所論十七分後有言前之未盡者有言我法粗細者有言重問發菩提心者有以非人而不出己者有以引他為自把柄者俱在夢中說夢此真報佛恩語也不思經文本曰聞是章句受持讀誦為人解說則佛說此經原自有章法句法可解可說何致捕風縛影各逞臆見乎余謂此經語氣回環操放之間淺深層級直是一筆極有規矩文章頗與大學中庸相似今姑以愚所見略陳之若見非相之相則見如來此一語實全經宗旨也興末後如如不動并古偈全義相照應如如不動非相之相也一切有為法應作如是觀即見如來也崑崙阿耨達池與大海尾閭呼吸相通此其象矣舍此無所謂彼岸者若降心修行則渡海之筏也空相無住則捨筏是非降修不能渡海非空相無住不能登岸此如來實法全體即諸佛衆生一切法也何也蓋諸佛衆生有過去現在未來之異相而無異心過去心不可得現在心不可得未來心不可得故過去者當如是知現在者當如是見未來者當如是信解皆歸不生法相譬如萬川印月總是一月月滿萬川同歸無月正所謂三世如來也若乃降心者必先信心故於信心之問獨詳降心曰不取曰無得皆降心之無住也修行者必先持行故於奉持之問獨詳修行曰成就第一曰忍辱布施皆修行之無住也蓋降心為解修行為行解行成就方為到岸然猶非捨筏之登至於受持讀誦不知輕賤但得阿耨多羅三藐三菩提不可思議功德而後直是彼岸如來矣然此特因空生之進問信持而廣為演說實與首章無二義譬如前殿後殿佛土雖殊莊嚴則一經傳異體洵非誣耳至如十七分後論現在佛法以無我為實要見如來法即佛法也二十一分後論未來衆生法以平等為實要見佛法即衆生法也三世一法非彰明較著者乎然三世之中又兼三世如問信心曰衆生得聞現在相也問奉持曰後五百歲未來相也佛法曰三心不可得衆生曰是法平等無有高下則經緯三世貫串無跡雖織錦雕蟲無以過是蛛絲馬足不足為喻真神龍變化出沒非常之妙矣洎乎三問既終乃即二法雙結如來三十二相既不可見并不可觀幾於斷滅矣故遂以莫作斷滅相挽定非相之相佛無去來又無塵界亦幾於四相皆空矣故又以是名我見人見衆生見壽者見挽定非相之相佛與如來皆有非相之相而衆生皆在其中兩佛同歸一相三世原無二理如如不動宛然呈現謂見如來其誰不然乃遂一語跌出牟尼寶光千聖傳心要訣只此一偈全部金經宗旨只了此一偈如神龍之得珠歸海忽然大地雲收霧散一片晴空真天造奇文自然靈筆玉書金簡不足比其精八會十華不足追其奧而乃謂不當以文字求抑何謬也若乃段段以福果為勸徵又段段以空相為究竟層層淺深尤有精意如首章大法福德之後結以非相其喻為四虗空蓋如來非相之相正虗空象也非四虗空不足以當如來實法之比擬固有分量矣若信心福德屬貪薄一邊故以七寶布施較而不取為解中之解則為三千大千世界之七寶無得為解中之行更進一層則為恆河沙三千大千世界之七寶同為七寶較量奢約不同也若持行福德屬瞋薄一邊故以身命布施較而般若第一為行中之解則為河沙身命忍辱布施為行中之行亦進一層則為盡日河沙身命同以身命較量而稀密不同也然所謂布施者皆世俗人之布施至降修兩至心行兼到底于癡薄出離三界直為荷擔如來菩提矣乃即以佛所供養諸佛功德較其為不同更何如也若乃十七分以後皆就說法言說法近于解而未及行雖究竟實理即解即行然所謂實無有法無法可說莫作斷滅相是名我人等見皆解一邊故亦皆以七寶較而無我法則以三千大千七寶且曰無福德故則又隱然一虗空同相也平等法以須彌山七寶較且曰譬喻算數所不能及則又隱然一不可思議同相也如來無斷滅相則亦以河沙世界七寶較而且曰不受福德則亦隱然一虗空同相也佛於四相非見為見則亦以無量阿僧祗七寶較而但曰其福勝彼則亦隱然一不可思議同相也至其所稱較量福德之人亦各有不同如信心不取為解之初則布施七寶者稱人以後信心無得及三層持行所較者皆稱善男子善女人至解行兼後則佛竟自舉以較矣至佛法無我衆生法平等兩較福德亦皆稱人而如來無斷滅相較獨稱菩薩而佛法是名四相見亦稱人若首章言如來實法則直以虗空較而無所稱其中淺深顯然不苟地位主客確有倫次而說者茫無分別竊恐未安昔法達禪師誦法華經三千卷六祖謂曰汝但執口念為功課耶何異犛牛愛尾也師曰豈解義不勞誦經耶祖曰迷悟在人損益由汝所謂心迷法華轉心悟轉法華師蒙啓發遂以偈頌曰經誦三千卷曹溪一句亡未明出世旨寧歇纍生狂故楞伽云因語見義如燈照色菩薩亦爾因語言燈入離言說余不敢以荃蹄為魚兔然魚兔未得亦不敢夸言六經為糟粕也願與有志菩提者共證之儒與仙佛皆言道矣然道原於天天一則道一道根於心心一則道亦一經生家守古人傳習之末不悟性命精微之要妄分彼我角立門墻猥以釋氏為異端夫孔孟之所謂異端豈釋氏哉蓋釋有五戒猶儒有五德其似是而非者謂之異端儒之異端猶釋之外道故孔子所攻者心逆而險言僞而辨行僻而堅順非而澤記醜而博乃鄧柝尹何少正卯之流而老聃則目為猶龍伯夷柳下惠則稱逸民至宰嚭問道獨指西方聖人夫老聃即迦蘭仙人之類而夷惠則捨國太子忍辱菩薩也豈孔子之所謂異端乎孟子所闢者無父無君鄉願亂德乃惰四支縱耳目好貨財私妻子不顧父母之養正楊氏為我之賊也非以辭榮養生為無父也饔飱並耕桐棺布被以市恩天下譽則歸己毀則歸人正墨氏兼愛之巧也非以遁世修性為無君也故庚列莊慎清靜虗無與孟子同時不聞有訾議而伯夷柳下且為清和之聖於陵仲子匡章徐夷猶欲倚門墻則招之則孟子異端豈釋氏之謂乎昔上古神人吸風飲露乘雲氣御飛龍遊乎四海之外使物不疵癘而年穀熟即儒傳之無懷葛天而釋教所謂梵仙也夏商以上神靈鬼物之事顯著甚多周穆之日化人乃來遺像於石至秦世復見由余識焉故顏淵不飲酒不茹葷孔子謂祭祀之齊非心齊莊子生不布施死何含珠為施於人而不不忘非天布也即不住相布施之義而隱几喪偶偕來忘我魚樂蝶夢之類直是不語禪機指頭參話與柱拂舉棓何異然則孔孟以前曷常無釋教哉若漢明求像白馬西來特流通貝文之始耳今觀四十二章經曰人事天地鬼神不如孝其二親二親最神又曰六情已具生中國難奉佛道值有道之君難其理初不悖忠孝逮魏晉以還崇奉既廣其徒不純不能闡揚大道專以因果報應供養布施恫愒人主聚斂財寶至唐世益甚於是姚元之有外求之論韓昌黎有迎骨之諫要亦正教中刮磨淘汰之助矣特其附會孔孟指斥異端不能無文士之習焉而後之腐儒遂相牽引以為扶翼道學之盟主嗟乎夫所謂道學者豈有外於明心見性哉今即金剛一經言之無我相人相衆生相壽者相即喜怒哀樂之未發也一切衆生我皆令入無餘涅槃而滅度之即欲立欲達我道一以貫之也應無所住而生其心即致知止善之學也是法平等無有高下即天命之性也實無我法無法可說即率性之道也聞是章句受持讀誦為人解說即修道之教也如如不動即上天之載無聲無臭也非相之相即易之無極而不住相即乾元用九之用也種種福德果報即禎祥妖孽之理與湯誥福善禍淫洪範休徵咎徵也故屠緯真曰儒與仙佛其理實一而造用成就微有不同豫謂究竟亦無不同也孔子曰朝聞道夕死可矣此實究竟之理而性與天道特罕言之蓋可以心得而不可以言傳非鄙薄而外之也所以宋世大儒言道者往往取資義學周程張朱蘇陸黃秦皆所不免而近世為尤甚然近世儒者多以名為纍必陰資其說而陽避其名且操戈焉以掩蓋其竊取之陋嗚呼我不知何以為母自欺也數百年來惟管東溟先生一人獨明目張膽言之而天下卒未敢有昌明之者則何也非盡儒之彼見不銷而亦由於釋之自晦其教也蓋譯之宗與教猶儒之率與修誠與明不可偏廢而今之釋者好言宗旨不屑教品乃浮慕乎頓悟成佛之易而不知實修實行於是儒者愈疑其說之空虗誕遠而不可合此道之所以不明也發書生耳烏敢言道顧常奉教先人不肯以名實自遁幼年讀性理諸書中歲亦窺釋典皆不能有所得近自蟬蛻遊都始簡筆墨稍親鹿苑縱觀象教深信此道實出一源而其所異者特威儀動作語言文字間耳夫威儀動作乃理道之粗跡而語言文字亦風土之異音苟得其精何必以粗跡為表見苟見其同何必以異音為真假每見近世法喜皈依必以離家出俗為異夫難提尊者道玄居士豈盡離家出俗乎但得五戒精意何處非最上菩提又見近世支那撰述必以梵義方言為體夫白馬四十二章青牛五千餘文豈盡梵義方言乎但合迦文真旨何妨我用我法故余於此直將最淺近語敷演真諦務使雅俗共賞儒釋參同庶幾稍符廣為人說之教以彰明大道同源之理云爾附記發竊意此豈亦三生石上一公案耶蓋豫生平惟好古無他長尤敬佛書深信此種道理天壤間實實有之心性中實實具之顧惑溺舉業家雕蟲蠹楮虗靡四十餘春如一吷也辛丑歲嘗夢高山絶壁間有石像幅巾袈裟朱履者仰視之輒自喜為前世因傍揭聯句曰胸含萬嶺千秋雪目送長江一片雲覺而異焉自是頗有問徑蔗園意因爾焚棄筆墨為玄水之遊放袋叉手實自還其本來也無何浪迹京邑又復十載幸奚囊中南華一帙宗鏡一卷不致放廢時從塵氛喧會之側展閲一二真不啻清涼散蕩滌心胸矣及見諸世故升沉得失倏忽遷變人情𡾟險同於芒刃益深省悟歸而杜門息慮遂多暇日乃以金經課誦修嗣續因則又恆苦目疾每學禪坐冥接或於夜分晨清理會大意竊見其中前後層次極有淺深照應章法段落直與儒書不異不知何故從來注疏零碎疊復茫無貫串因以己意試為疏之初亦非欲問世不意一二月間屢感異夢如佛像天書星斗雲漢及彩筆雕墨贈買扇籍等事凡數十見嘗一夕三四夢稍合瞑即形僧佛異像者於是不禁自驚自疑曰豈比鹵莾杜撰果有當于密諦乎何遂煩幽貺若此自是更覓諸家舊德疏論及各譯原本證之不意杜撰所見亦時時頴露於前人特相沿成說不肯離窠脫臼而三世因緣則直與彌勒偈符契於是遂不自揣張膽而言謬成章句然猶未敢孟浪災梨也九月朔且以筵卜之天及大士得吉既望又以龜卜之神得從十一月朔又有恆修長老為豫跪請大悲籤得句云夢中說夢獲多才身外浮名總莫猜水遠山遙難駐足貴人一指笑顏開蓋豫於沉迷說海之際得破疑城而直出者實始正眼夢中說夢之句不意佛語首及之婉如面命更可異也於是率爾授梓究未決其孰為莊生孰為蝴蝶矣恆修南昌人行腳禾中冬夏不著芒鞋人號赤腳和尚近歲募修三塔寺大悲閣鐘樓里人多敬信之癸丑又屬修天寧佛閣師以鐘樓未完有待也七月大風佛閣東倚欲頽里人急呼匠搘之尚未用力是夕師禪坐閣中至夜分異香黂如數百人邪許者柱斗間格格有聲心知為神助也閉目不動逮天明起視則東西皆中繩矣惟南北尚稍倚明日師為豫言之里人皆知佛閣之神牮而不知師坐其中也師亦不與人言蓋實修功行者時康熙十有二年歲在癸丑仲冬南至之七日智普又識章句經曰聞是章句為人演說蓋章句者演說之要領也故諸經皆有品分章句明別學人易於尋伺獨此金經文義奧衍而昭明分第又非章句之真故人多異解茲特正之通序法會因由分前半段凡二十九字別序法會因由分後半段凡四十二字正宗經一章言如來法也無相為心法布施為行法若見非相之相為如來實法善現啓請分大乘正宗分妙行無住分凡四百六十字說經之一章言信如來法者以不取無得為實應首章心法也正信希有分無得無說分依法出生分一相無相分莊嚴淨土分無為福勝分尊重正教分凡一千一百三十二字說經之二章言持如來法者以般若布施為實應首章行法也如法受持分離相寂滅分持經功德分凡一千一百二十二字說經之三章總言信持如來法者有非相之果以應首章見如來實法也能淨業障分凡二百零七字說經之四章言佛法無我即如來法也究竟無我分一體同觀分法界通化分離色離相分非說所說分前半凡一千二十七字說經之五章言衆生法平等即佛法也非說所說分後半無法可得分淨心行善分福智無比分化無所化分凡三百六十九字說經之六章言如來無相亦非無相也法身非相分無斷無滅分不受不貪分凡三百七字說經之七章言佛無法相亦無非法相遂言古偈以結之如來實法全矣威儀寂靜分一合理相分知見不生分應化非真分前半凡四百二十一字流通應化非真分後半凡四十四字全經正文凡五千一百六十字讀法凡語意截然可斷者為句點在字傍或語意趨下語氣相聯而句長姑作分斷者為讀點在字下音逗凡全經宗旨前後相應要句用眼目用各章語意趨重要句眼目用立言分別處用逐段義理初見處用遂句中著意字眼不可忽處用凡佛語與須菩提語轉換處用以上務為標題醒眼方便人尋伺要領非同文士評隲浮華之例讀者鑒之
