body:
  text: 嘉興智普居士徐發詮次標名金剛般若波羅蜜經般音撥若音惹金西方之精剛堅也般若梵義智慧也波羅蜜梵義彼岸猶言至極處此經宗旨言人心有至堅之智慧皆可以造道而至于極也蓋人心清淨原有真慧但為物欲所蔽于是識蘊萌生不得見道若能空諸相而生于忍如其真慧歸諸清淨則離此到彼離塵作佛矣通序如是我聞一時佛在舍衛國祗樹給孤獨園與大比丘衆千二百五十人俱比去聲凡比丘之比皆倣此通序晉釋道安所定昭明總下文為法會因由分按釋迦譜云佛將涅槃六群比丘問結集法藏一切經初安何等語佛曰當安如是我聞一時佛在某處而說是經因凡經皆有此起故以為通序也今從之如是我聞猶言如此者乃我所聞我集經者自我也譜云阿難佛釋迦牟尼佛梵義覺也有自覺覺人二義舍衛國名其國太子名祗陀常舍所種樹之園興長者須達拏給養孤獨貧人故名祗樹給孤獨園比丘梵義有怖魔淨戒乞法乞食等義大比丘德高行修之稱千二百五十人統言一時所聞佛說法之衆有如此釋譜鑿鑿有其目不必泥總見此經乃衆所共聞非私撰耳別序爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐飯食之食去聲別序亦道安所定專序祗園一時演法之由故謂之別序世尊舉世所尊仰者崇稱佛也食時當食之時佛法過中不食此午前也衣僧梨衣鉢所以貯食次第乞沿門乞不擇貧富也飯食重造飯以食所以蠲潔也敷座而坐垂衣於座結趺而坐即禪坐也言此以見佛之行住有節儀容有度皆清淨持戒之相也正宗凡佛說起至經義盡謂之正宗亦道安所定諸經皆然後人以經義深長文句繁衍學人難於理會乃有品分之分故昭明於此經作三十二分不過約取每段大意標出四字以便學人尋伺原非章句即天親菩薩二十七疑之例特稍集其要耳豫見後人依傍二家太過轉展誤謬由於貪求實義不辨語脉虗神不知淺深要歸所在故十七分後問語重復而解者遂多穿鑒不知經文明曰聞是章句為人解說則此經中原自有章法句法有章法句法則必有起伏段落淺深層次所謂語脉虗神正實理之門戶也誰能不由門戶而見堂奧者乎豫是以據本文之起伏段落次為八章究實理之淺深層次顯出三世一法庶幾初學者尋門得路然後登堂入室不致竄越徑竇庶有稗于詮解焉若乃禪宗頓悟一語半偈便了生死誠無藉此老婆子矣時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞長上聲降平聲樂入聲此一節問答初機莫逆之概也長老尊德之稱須菩提長老之名梵義曰善見亦曰善吉亦曰空生袒肩膝地合掌釋儀也希有世尊世所無有之尊德也如來凡佛至極之號真性自如隨化而來謂之如來按佛本是如來轉化也須菩提所問如來之號實指過去如來言故下文復以見如來正答其問也護愛護也念顧念也故偈曰加彼身同行付未得者付之囑已得者堅之故偈曰不退得未得菩薩梵義未入聖位之賢者善男子即比丘善女人即比丘尼阿耨多羅三藐三菩提梵義無上正遍正覺無上即無尚莫以加也正不邪遍不隘正覺至正之智慧性發此心即修道之心住安住猶言究竟歸棲之地降伏制之使不放逸蓋心為萬善之根亦為萬識之使得其制則為聖為佛失其制則為業為小人為聖為佛即究竟歸棲之地矣善哉善哉讚歎之詞如汝所說如汝所問如來法也諦審也當為汝說當以如來法為汝說也如是住如是降伏先為虗詞如其所問應之以見一一分辨也唯然應諾之聲願樂欲聞志所慕而心所喜之欲聞也敘此以見佛之善教須菩提勤學之意佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者此是降心之實何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩相去聲後同此一節正答降伏其心也摩訶薩梵義大菩薩一切衆生指下九種卵胎濕化皆以四大五陰和合而成謂之欲界天離欲界但有色而已謂之色界天離色謂之無色界天又有空無處識無處二天謂之有想天又無所有處謂之無想天又有頂一天謂之非有想非無想天以有細想而無粗想也愚按梵義如此不敢強解然以理推之竊謂佛法惟心心之靈明不生不滅非儒家所謂形質之心也故心之所見有清濁粗細即有色想有無等天而衆生之心入某天者即為某天之衆生故釋典所言天人鑿鑿有相天人不淨亦墮惡道所以同稱衆生竝資佛度也無餘涅槃梵義謂煩惱既盡五陰亦滅但有真常自性曰涅槃并真常亦無可證曰無餘涅槃滅是去其識蘊度是脫其生死輪回圓覺所謂有性無性皆成佛道也蓋佛法慈悲以度生為用見衆生現在瞬息過去業報無窮現在救濟不如向後超度之恩深故儒家以博施濟衆為聖功而佛家以無餘涅槃為廣大所見有不同耳實無衆生得滅度者言此滅度之真性本衆生所自具不假造作我亦隨順真性化度之初無功用故雖度盡衆生而不見為度生若見為度生即是著相非菩薩矣四相該上九種在內對我而言謂之人衆生皆是也所憎惡者謂之衆生所樂慕者謂之壽者廣而言之則六道為衆生諸天為壽者約而言之則賢愚愛憎而已然此本所以答降心而言度生空相者蓋度生為降心之功用而空相即降心之真體非空相不足以見降心之自成非度生不足以見降心之成物成己成物總為一心之量即體即用乃為第一之常故偈曰廣大第一常其心不顛倒利益深心住此乘功德滿蓋下文所謂無住布施即度生無相之心而推之修行也非有兩層故曰功德滿復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住行去聲不上聲此一節正答應云何住也法本無住上言無相其義盡矣此特因空生有應住之問故即以無住為住答之正佛理之圓妙也其義實與儒家止善相近故先言降伏而後言應住亦如儒理先明親而後止善然須菩提問則先住而後降者問者疑義未柝答者條理必貫耳復次又言也文勢相連而別起一義也後凡言復次例皆倣此法佛法也行功行也佛法雖止一心而必見諸行事則布施而已矣布施所該甚廣約而言之則一施財二施法三施無畏合而言之則滅度衆生即布施也但上以心言故曰無相此以行言故曰無住其理一貫色聲香味觸法謂之六塵亦曰六識六識起于六根即眼耳鼻舌身意言凡為六根所感一切布施此正不住相布施也然布施似于損己利物故凡人不能無相不知此不住相布施者其果為福德如四維上下虗空之不可思量則布施無相福德亦無量矣人奈何不為修行哉故又呼須菩提而告之曰菩薩但應如所教住蓋以無住為住乃真住也實總結上文兩節之意但文氣似貼應無住布施上此亦佛語靈妙處讀者勿以文害義庶為得之初斷行施住相疑須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來應空生所稱如來此一節正答如來法也蓋空生首問如來善護念付囑其意本問佛法特以佛因地有如來之號故稱如來佛亦即因地如來法應之故全經所稱如來皆屬過去之化身佛乃如來之應身屬現在現在有身相過去無身相其理甚易曉佛正欲於淺近處引入妙義乃即境而呼空生以問之曰可以身相見如來不身相化身之相也過去即滅故空生遂以實對而却引如來所說身相即非身相為證則空生意中亦自有別領會矣故佛亦乘機而正告之耳如來所說意是當時有此傳習之說空生引以為證若謂如來即佛不必分別則此經專以三世異相之疑統歸一相皆無從領會矣觀此則空生意中亦未常以佛與如來混作一人此章為泛問因地如來法不必疑矣凡所有相皆屬虗妄此正空相之實理佛法之大源也蓋佛法以一心之靈不生不滅亘古不斷故百年旦暮形骸如寄凡所有相皆六根六塵為無明識蘊所熏染則今現在雖有身有相與過去之無身無相訖何異乎故曰皆是虗妄然而形骸塵識之外自有真性乃實相也實相無相即為法相但凡人執相故不能見法相若能空諸相則法相見矣故又曰若見諸相非相即見如來就眼前淺近引入深義以究無相宗旨而即以完空生發問之意正佛機之妙文義雙絶者也故偈曰分別有為體防彼成就得三相異體故離彼是如來三相應身化身法身也有為即指身相須菩提謂不可以身相見猶有過去現在之見故曰三相異體故若泯三相之異則見非相之相即見如來故曰離彼是如來偈語甚明今人多誤解右經一章言如來法也無相為心法布施為行法若見非相之相為如來實法也發謂金剛般若波羅蜜經之目本佛所自名經文可見然方在演說之始而遂謂此經於理未合故先德多疑之訖無定論豫觀楞嚴論諸實義盡文殊亦請如何奉持佛遂唱經目後又言天獄諸趣及奢摩他魔事皆推廣餘義故溫陵以結經分助道分別之今此首三節實盡宗旨末後說出見如來尤有祖述憲章之意以後反覆辨論總不出此故稱是經顯有了義豫因分此為經亦溫陵之意也須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不二斷因果俱深難信疑佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法知筏喻者法尚應捨何況非法三斷無相云何得說疑須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切賢聖皆以無為法而有差別此一語是下章四果佛菩薩伏脉此一節言信心以不取為實也言說章句總指經文然空生意自偏在非相之相即見如來上蓋猶恐衆生疑不能見也實信深信此般若可以見如來也後五百歲據梵義有五五百歲此後五百歲乃末世法壞之際故偈曰惡世持戒修福與信心為實有戒定慧三意其次序如是耳善根不貪不瞋不癡也淨信清淨無相之信也悉知悉見佛心感通也佛答之意謂此法之實豈難信乎雖彼惡世尚有信者但此信者必種善根已久故能清淨其信有無量福德何也蓋信以不取相為實也無相不惟無四相而且無法相無非法相蓋法即四相四相即法原無二體故有法即有四相若曰無法則四相之障更何盡乎所以法與非法皆不應取譬如渡者捨筏法之所以應捨也然非筏何以得渡則非法又豈可取乎此信心之所以清淨為實也一切賢聖學佛已到未到之謂即下四果及佛與菩薩皆以無為法而有差別言賢聖差別等級雖多而總不出無為法佛意又謂信心者何以不應取法乎蓋法本無有定名也何不即思如來之所得與所說安在乎須菩提乃以佛所說之義推之而知如來法果不可取不可說且原無法原無非法且不惟如來為然而一切賢聖高高下下皆然則信心者以不取為實又何疑乎須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法此一節言不取之報三千大千言世界之多七寶謂金銀琉璃珊瑚碼瑙真珠玻黎然釋迦譜所謂七寶具足又一金輪二白象三紺馬四神珠五玉女六主藏臣七主兵臣不必泥也上言不取信心乃貪絶也故以七寶布施之福較量從其類如無相不住福報以虗空較量各有深意是福德即非福德性言本無求福之心亦不取意如來說福德多就世人所見言然不貪能捨福德報之原是實理諸經說因果皆是此意但佛語不著一邊此經指前問答如來法一章蓋佛因過去逢事如來今為弟子演說者實如來法也故尊而名之為經前此須菩提只認是佛說故但曰章句自此以後須菩提亦稱經矣曰當何名此經曰甚深經典語氣可見四句偈一切有為法四句也此偈實該佛法之全體相傳古偈人人稔知故特於末後出之乃至四句偈等分明自首至尾之謂一切諸佛即一切賢聖之意要見一切賢聖皆以無為為體而皆從此經出則此經以非法為法其理貫矣佛語前後照應脈絡分明但縈回紆折出沒無迹故不易曉耳四斷聲聞得果是取疑須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行五斷釋迦然燈取說疑佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得六斷嚴土違於不取疑須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴總承上六問是故須菩提諸菩薩摩訶薩應如是生清淨心即無得意不應住色生心不應住聲香味觸法生心應無所住而生其心七斷受得報身有取疑須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身無得是真得此一節言信心以無得為實也須陀洹梵義入流謂斷三界見惑已盡可入聖流也斯陀含梵義一來謂斷欲界九品思惑中前六品已盡後三品尚在須更來欲界一番受生也阿那含梵義不來謂九品俱盡更不來欲界也阿羅漢梵義無學謂斷色界無色界思惑俱盡更不受三界生死無法可學也無所入無不來無往來無所得只無相一意無諍不惱也謂不起衆生之煩惱三昧梵義正持謂任緣一境守正持之離諸邪妄故為入定之正法人心煩惱皆自欲起故得無諍三昧者謂之離欲阿羅漢阿蘭那梵義寂靜亦云無事即無諍意莊嚴佛土言恭敬佛相也蓋心上以佛土為莊嚴而恭敬之即是著相非真莊嚴故偈曰非形第一體非嚴莊嚴意清淨無相為第一體譬如取喻也以明非實說須彌山釋典謂四天下之中日月所環繞王尊稱佛法不分有色無色有想無想皆謂衆生故有獅王蛤王樹王鵝王等名佛意承上文一切賢聖皆以無為法而有差別乃須菩提所知也故以諸佛品地歷歷問之自四果而上至于如來自如來而下至于菩薩精之則為菩提粗之則為佛土皆不可以作念有得于是總而結言之曰是故須菩提諸菩薩摩訶薩應如是生清淨心不取即清淨心蓋因諸菩薩實無所得如此故不當有取不住聲香味觸法即是清淨無所住而生其心即是生清淨心特恐人疑別有所謂清淨心故復以經中不住無住盤旋束定而又以生其心繳出能生信心之章旨真天地至文也山王一喻總是不取無得意而是名大身又非真無取故偈曰如山王無取受報亦復然言雖受報而無取則非無報可知今人因昭明於羅漢下分截遂將清淨不住單頂莊嚴而上文種種無處安頓又鑿出許多疑端強為過文甚是支離須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法此是下章忍辱布施伏脉若是經典所在之處則為有佛若尊重弟子此一節言無得之報而遂以第一希有啓下文受持實相之義也恆河即浲河梵語多耨河譯者轉音今北人亦轉為渾河黃河以其沙數為河之數又以諸河之沙數為三千大千世界之數七寶滿之甚言七寶之多耳亦見無可取之象蓋借喻義故下又以實言告汝別之無得亦貪絶故亦以七寶布施較量而勝之復次以下又言此經之勝蓋不唯福德勝于財寶布施而又能成就最上第一希有之法則豈徒信心而已更當知所以供養尊重也隨說隨舉一二義說之天諸天人世人阿修羅果報最勝勢力無畏能攝持世界與天帝爭權但瞋性最重故次於天人却能為佛護法此種有胎卵濕化四生盡能讀誦盡始盡終而讀誦之最上諸乘之上第一諸法第一希有世界所少復次以下正言一念淨信實相此經隨舉一二義說之一切天人阿修羅皆供養如佛塔廟況其人能盡始盡終而讀誦者必能成就最上第一希有則淨信若是豈不宜哉隱然逼出下章奉持之問矣若是猶言如是即指上言成法受報如是故此經不惟誦說當敬即非誦說之時而安置所在之處亦如有佛所在當以弟子事師之意尊重焉此正教人信心之實也若尊重弟子言若弟子之尊重本師倒裝文法如不也世尊一例釋典極多此種文句所謂釋教用逆也舊說謂如佛之敬高第文殊普賢等謬甚供養說法之人尊重說法之地兩意實一貫右說經之一章言信如來法者以不取無得為實應首章心法也愚按經文本曰我為汝說又曰聞是言說章句又曰如我解佛所說義又曰不能解我所說前後不一而足要見佛之所謂是經原是崇奉如來祖述之意而非自謂所說也法不憍上儒釋一理今人學佛之心豈不曰佛語即經乎要之佛意原有不同故前稱是經而後稱所說亦如儒家稱引堯舜詩書之例茲豫於信心問後別為說經亦以明佛尊法自謙之心耳爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜則非般若波羅蜜是名般若波羅蜜須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相此一節言奉持以般若為實也般若即上文第一希有之法蓋佛法以智慧為根本道神足經云般若波羅蜜是諸佛之母故又名第一波羅蜜凡人修行須先照了本性無物一切無明識蘊皆為後起之塵網然後可以空諸相積功行猶大學以致知格物為先事能致知然後知止而能得儒有知行釋有解行其理一也般若即解耳此經專教人以智慧空諸相而空諸相即是智慧若一著意便屬有相故又曰則非般若波羅蜜是名般若波羅蜜然既已立此名義矣而又若不必有此名義恐人疑惑故下遂以如來無說證之而以微塵世界三十二相驗之要見般若之理如此則奉持者當何如乎微塵世界形相也佛真性中一切皆空故山河大地皆非實相空處正是實處佛法如是非喻煩惱之謂三十二相如來感果法身之相法身原非耳目所及故不可得見此意亦淺近然比初問色身見又進一層矣言此以見世界微塵佛相皆無真相正是般若實相則能奉持般若者其果當何如乎蓋已逆取較勝身命布施之意也須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多此一節言奉持般若之報承上言所謂般若實義如此故能奉持者其福德勝于布施身命蓋布施身命者但能空身命相耳彼奉持般若者能空微塵世界三十二相則身命其毫末矣豈但能布施身命者可及哉奉持般若瞋絶也故以身命布施較量亦從其類或曰般若何以為瞋絶凡人瞋性只起于有身相空相者無身身且無之何物可瞋玩下忍辱布施至于割截身體而不瞋恨其理自明故偈曰苦身勝于彼希有及上義苦身即瞋絶之謂然希有第一之上義又能勝之則知希有義中已包瞋絶故下文以第一忍辱竝論爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者則是非相是故如來說名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有何以故此人無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛八斷持說未脫苦果疑佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜須菩提忍辱波羅蜜如來說非忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛說菩薩心不應住色布施須菩提菩薩為利益一切衆生應如是布施如來說一切諸相即是非相又說一切衆生則非衆生九斷能證無體非因疑須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗十斷如遍有得無得疑須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德此是下章消滅罪業伏脉解去聲支解之解如是讀此一節言奉持以布施為實也趣向也涕淚悲泣因聞般若空相至于世界身命皆空故感而生戚正是須菩提信心實相後佛語不驚不怖不畏忍辱布施等謂正破此意也第一希有功德即成佛也蓋般若實相即是非相般若非相即是離一切相離一切相即名諸佛非第一希有功德而何故佛以如是如是許之而遂即其涕淚悲泣之意以醒之曰所謂希有實相者必聞是經而不驚不怖不畏者也何也蓋般若為希有者非僅能解而已必見諸修行也解則謂之第一波羅蜜行則謂之忍辱波羅蜜何也非忍辱不能不住布施非不住布施何以成就希有之功德而為佛乎歌利梵義極惡無道時佛在山中修道王常出獵倦寢王諸妃私來禮佛佛為說法王覺而怒問佛何名為戒意佛窺婦人非戒也佛答忍辱為戒王即割佛耳佛不動又割鼻亦不動又截手足亦不動但見白乳湧出感應四天王雨沙飛石大風拔木擲于王所王乃怖畏長跪懺悔佛言我心無瞋亦如無貪王不信即立誓若真實無恨心此身平復如故設是願已身即平復忍辱仙人大約同此意而不同時耳兩引皆證無相之實行也下乃以正意說應不應應離相故不應住不應住布施故割截忍辱而無瞋可見忍辱為布施之根本則忍辱波羅蜜即第一波羅蜜矣利益衆生又是推言布施之實相也真語不僞真性中語實語不虗實理中語如語不變如義中語不誑不異不欺人耳即指上忍辱等事此乃佛過去時事恐人不信故自表其不欺然仍以如來為號下又曰如來所得法無實無虗則又兼趨忍辱布施全理正佛機圓妙筆墨之靈也明暗之喻言實行如見實理則布施即般若解行合一也解行合一非佛而何故下遂以則為如來成就功德結還須菩提所謂成就第一希有功德即名為佛之意而奉持之實相亦完矣近說于第一波羅蜜與忍辱波羅密處分作兩截上下支離文義遂不貫須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解說須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處此一節言奉持布施之報而以最上大乘啓下文滅罪得菩提之意也初中後謂一日三時一日三時以恆河沙等身布施極言布施之多耳然此亦非誕語只要善理會假如出一言發一語但是利人不思利己便是若為生民主及宰官者起念作一善事天下蒼生受惠實有一日三時恆河沙布施之理豈必投軀舍身巖方為身命布施耶發心菩提廣運無涯謂之大乘超三乘之上即大乘亦不能及矣謂之最上乘發發此最上乘之心故受持讀誦廣為人說即可得成就最上乘之功德荷擔如來菩提法也若樂小法者見解未真癡性未滅四相森羅豈能信奉乎般若忍辱為奉持實相瞋絶也故皆以身命布施較量而勝之亦從其類右說經之二章言持如來法者以般若布施為實應首章行法也復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議至此方結完信持二問此一節總言信持成就及果報也承上二章言信心奉持之實義如此福報如此而人猶疑者則以其癡性未絶也人心有三毒塵障蔽轉展相生故不能成佛若貪瞋雖薄而癡性不滅猶墮邪見外道世人責報現在不知過去未來總是一性故報有先後但見持經信佛之人未免輕賤遂多疑之此正是癡性種子故信心奉持者苟既純熟而且又能不以現在為疑則其人慧力已定般若已圓是必真得菩提者其福果更何可量哉蓋得菩提即是佛果故下遂以供養承事諸佛較量所不能及而其成就可知福德至極可知矣不能具說猶如虗空之不可言狐疑不信亦與癡為類蓋持經至此心行皆純信持皆空直是一非相如來故其果報至于不可思議要即取譬虗空之意也以上說經有三層信持猶首章有三層實法皆解行自然之理亦聖教自然之序也分之則淺深各見合之則究竟一源學者能由言相出離言說庶為得之右說經之三章總言信持如來法者有非相之果以應首章見如來也以上三章語氣段落如是實理照應如是細分之則信心不取心法中之解也其相虗故以三千大千七寶較勝三千大千虗相也信心無得心法中之行也其相實故以恆河沙世界七寶較勝世界實相也奉持般若行法中之解也其相虗故以恆河沙身命較勝恆河沙身命虗相也奉持布施行法中之行也其相實故以三時身命較勝三時實相也兩法各結以天人阿修羅皆當恭敬而心法之恭敬則曰如佛塔廟若尊重弟子亦虗相也行法之恭敬則曰即為有佛作禮圍繞以諸華香而散其處亦實相也若第三章總言果報則消滅罪業虗相也故曰當得菩提亦心法之虗相供養諸佛功德實相也故曰算數不能及亦行法之實相各各雙行皆兼解行虗實兩義蓋釋之解行即儒之知行大學必先致知而後能修齊治平中庸必先慎獨而後能參贊化育佛法必先降心而後能不住布施其理一貫昭如日月近者諸家章句不明故多誤解此豫特創而辨之要亦自盡其書寫讀誦廣為人說之勤已爾十一斷住修降伏是我疑爾時須菩提白佛言世尊善男子善女人此處不復舉如來發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者若字者字是未然口吻與前問過去不同當生如是心我應滅度一切衆生滅度一切衆生已切已指示口吻亦與前不同而無有一衆生實滅度者前得滅度是就功效說此云無實滅度是就我心說何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者十二斷佛因是有菩提疑須菩提於意云何如來於然燈佛所此方是佛自稱過去相有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記才是明明說出汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼十三斷無因則無佛法疑何以故如來者即諸法如義正是自解意若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來說人身長大則為非大身是名大身十四斷無人度生嚴土疑須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩此一節須菩提再問現在佛法而佛言無我法也前此須菩提本問佛法也因佛屢稱如來故疑佛別有法至此乃即現在善男子善女人而申問之佛答一如前說而但專其指曰實無有法又曰一切法無我蓋佛至此才認如來是我矣前此空生謂如來即佛佛則推而遠之今此空生疑佛有異則又親而合之不即不離非一非二正佛機妙用所以破空生有相之疑也故下遂證以然燈授記當得作佛則無法即佛法佛法即如來法又何異哉諸法如義言諸法如其真性有儒家率性意無實無虗即真性之體真性一切皆具又一切皆空真性一切無異則一切法皆是佛法又何疑佛與如來有二法乎此佛法佛字泛謂學佛之法然所謂一切法皆佛法者但就破疑而言若論實義則所謂一切法者亦無相矣故又曰實無有法人身長大亦是喻意言一切法為佛法而又云非一切法者譬如謂人身長大非以形相為大乃以法相為大也是緊緊繳明上文之意不必另作法身實講方得譬如二字語氣菩薩亦如是正答空生所問現在菩薩又就譬如之意而申言亦不當作滅度衆生之我見以合如來無四相之旨要見無相故無法耳文義回環上下一貫不可離說離說即非此經真面目矣莊嚴佛土亦是著相意就現在學佛人言故加我當二字作虗語以禁之蓋空生所以重問佛法者原為現在祗園會上諸菩薩開門路也故前既反覆以明實無有法而此又兩呼菩薩若作是言以正之良由諸菩薩看得今日別是一番境界定與如來不同皆由我見不淨之故因我見不淨而遂別求我法此空生重問之障蔽也故又明言以結之曰通達無我法者真是菩薩亦可謂深切著明矣十五斷諸佛不見諸法疑須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼須菩提於意云何如恆河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來說諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得此一節言心無三世之別以明無我法也蓋須菩提所以疑佛有異法者由于三世異見也故以五眼無三世心破之見障內色而不見障外者曰肉眼內外俱明曰天眼照了諸相曰慧眼觀機設教曰法眼普觀法界曰佛眼恆河沙世界甚言衆心之多然五眼中實有此理如華嚴會一毛孔中皆有一華世界是也與信心不取章不同如來悉知若干種心正五眼所見也然其所以能知者非徒五眼之神通由于法心與塵心不同塵心有過去現在未來之異相法心無相故曰不可得言佛心中清淨一常不可得此三種塵心故諸法如如總是一法總是一無法何必以過去現在之異而疑佛與如來有異法乎故偈曰依彼法身佛依倚著之義言須菩提倚著現在報身相一邊故疑有異而佛乃倚著法身相為言以破之也偈意皆照三世而言蓋須菩提問法因緣實有三世異見故佛屢以身相破之自此以後更不一而足熟誦偈句自見十六斷福德例心顛倒疑須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多此一節言無我法福德也無我法與不取法同義故其福德亦勝於七寶布施福德無實亦是無我不取意不取法則法愈實不取福德則福德愈多無我法正是實法無我福德是真福德也然不言較勝亦見佛法不自憍上之意須菩提於意云何佛可以具足色身見不不也世尊十七斷無為何有相好疑如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足十八斷無身何以說法疑須菩提汝勿謂如來作是念我當有所說法答重問意才完莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法此一節合言佛與如來皆無相而且皆無法可說結完實無我法之意蓋上文既明無我法者由于三世一相也故遂以佛身現在之色相與如來法身之相並列而兩證之曰我今雖得作佛矣然所以得成就佛果者在此有為之色身能具足而自顯為佛乎不乎蓋佛之所以為佛者原有法身在而非此色相之身也故須菩提遂以不應對而佛之無我信矣佛乃又呼須菩提而問之曰如來雖過去不可得見矣而三十二相八十種好留傳人間則法相自在也汝以為如來之法身果在此諸相之具足乎不乎蓋如來諸相亦相傳應化之相非真法相也故須菩提亦以不應對而如來之無法相又信矣佛無我則現在之佛即過去之如來如來無法相則過去如來之法即現在佛法安所見為我法者乎此時佛才顯言與如來合一之故所以破空生重問之疑故下曰莫作是念我當有所說法此我法正與前通達無我法者相應而說法者尚為謗佛況謂有我法哉其警戒空生亦深且切矣此處并不言福果尤見佛不自增上之意右說經之四章言佛法即如來法也自此以後諸說謬誤多矣無論滅度衆生然燈無得遠跡相同即具足色身具足諸相兩問明明有佛與如來兩號而說者不分別況前此三問相見皆謂學人得見如來不今此見下不復有指是言佛自呈見故偈曰法身畢竟體正詮色身問也現在之佛色身即法身故曰法身畢竟體又曰以非相成就正詮諸相問也如來以非相為宗則并所謂三十二相八十種好之法身亦非真相矣故曰以非相成就蓋如來為過去之佛故以諸相為法身相雖稍異而總為法身則總非不佛然其所以成佛者皆不在此又非不在此故曰不離于法身彼二非不佛故重說成就亦無二及有下言無法可說亦兼如來與佛並言故曰如佛法亦然如如來也偈語簡文率多此例所說二差別不離于法界則豈可取為說法乎偈語亦甚明顯今人多臆猜總由佛與如來不分別故耳爾時慧命須菩提白佛言世尊頗有衆生於未來世聞說是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來說非衆生是名衆生此一節言未來衆生法與佛無異也須菩提既聞佛法與如來法無異則過去現在無異矣而佛言三世心皆不可得則豈未來亦無異法乎故又疑而問之慧命猶慧性前向上言曰慧眼此向後言曰慧命蓋佛言三世心不可得本有結前啓後之機而空生能悟故曰慧命非衆生言真性與佛無異非不衆生不修真性便與佛異耳若能學佛自空衆生之相此真得衆生之性完衆生之實者楞嚴所謂根塵同源縛脫非二也蓋佛法與儒理只是一性此性亘天地而不變豈以世之久遠而有異乎故佛答只就衆生之名號上闡發而未來不必言其理自見矣十九斷無法如何修證疑須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法此一節言佛本無可得之法與衆生平等以明佛無異之意也須菩提因上言衆生非衆生然則佛豈亦如衆生乎故以得為無得問得為無得乃不著空相一邊正佛法真體故佛答如是如是乃至無有少法可得乃至二字亦是先有後無意平等無有高下兼佛與衆生說四相亦就佛與衆生人我間互看無字與前空相不同此言無論人我衆生壽者凡修善法皆可得菩提正上章非衆生是名衆生意也善法修善心行善行之法就衆生言若使易知亦不外降心布施正衆佛無異耳二十斷所說無記非因疑須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一千萬億分乃至算數譬喻所不能及此一節言衆生平等法福報也須彌山王世界中獨尊者有喻佛意言衆生持經福德勝之隱然見衆生成就即能勝諸佛功德則衆生非衆生可知矣二十一斷平等如何度生疑須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者須菩提如來說有我者則非有我而凡夫之人以為有我須菩提凡夫者如來說則非凡夫是名凡夫此一節又合言如來不度衆生亦無衆生受度以見如來衆生皆無我法結完佛無異之意實無有衆生如來度者與實無有衆生得滅度者不同前言無相是衆生不受度此言無我是無衆生可度則非凡夫無凡夫之相是名凡夫有凡夫之實宗鏡四禪云信正因果能不欣厭而修者是凡夫禪為第二勝于外道有欣厭者然無欣厭亦是無我若并無欣厭之相亦歸無相則真所謂非凡夫是名凡夫矣此正人無我法無我人法俱空即心自性也右說經之五章言衆生法即佛法也按須菩提問未來世衆生緊貼上文未來心不可得發意語脉機鋒逼真一線然昭明聯作一分總入佛法中故後人遂多誤解此章法所以不可不明也以下六節又申言如來與佛皆無法相無非法相歸於古偈之實法以完首章非相之相意二十二斷以相比知真佛疑須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛告須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來此一節言如來不可以相求也不可以相見如來前此空生蚤已會心至此豈反迷悶故唐譯曲為回護顛倒其文世或信之不知觀與見不同見是外見耳目所及觀是內觀心意所致見是彼觸形迹所起觀是我設虗空所造故見淺而觀深見粗而觀細見則初學可除而觀則慧命所不能盡所以空生至此猶曰如是正明鏡之微塵不能逃于牟尼之照也轉輪聖王梵義四天下之王亦有三十二相故曰則是如來言若但以相取則輪王豈亦如來耶反言以探之使自思耳此時空生頂門一針矣故曰如我解佛所說義不應以三十二相觀如來所說義指一向所說之法義此一解字有費許多心思意蓋則是如來下不添一字明明是一句不真不假的口角故須菩提亦深思細勘而得之所以須菩提下有白佛言三字世尊上有爾時二字大約經中若爾時若復次若白佛言皆為特起之例或一意而兩翻兩時敘說要知佛理深妙原自有精思審言之侯也偈有四種一阿耨窣睹婆二伽陀三秪夜四縕䭾南初名不論長行偈頌但數三十二字為一偈四言八句也此以五言或亦有時代之不同耳色形相也音聲語言文教也二語兼無相無法意邪道非實法也不能見如來不能見如來之真法相也蓋三十二相亦名法相然乃報身之法相非真法相真法相則無相是矣宗泐注云問意謂可於應身相好中觀見法身相否正是此意二十三斷佛果非關福相疑須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相此一節言如來雖無相而又非斷滅相正無非法相之意也凡佛說法必兼有無兩義故文亦隨滾隨掃隨掃隨救如首章凡所有相皆是虗妄掃也若見諸相非相則見如來救也次章不應取法掃也不應取非法救也全經語氣純是此例然畢竟未曾明言有處以人心除無入有易除有入無難特於此處重說如來無法無相究竟之際乃明言以告人曰不說斷滅相其立教之意深且圓矣故宗泐云大乘所修福德之因所得福德之果但離取著之相不同小乘斷滅之見誠哉須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德此一節言如來法究竟之福報也前諸福報信心不取章稱人解之始也其餘皆稱善男子善女人解行之間也唯首章與此皆稱菩薩蓋對如來法而言解之盡行之至也前後不同如此無我無為也忍無生法忍也得成於忍無為中之有為法也此語亦兼有無蓋凡夫持有易持無難菩薩學佛將成之人持無易持有難故曰得成于忍持有于無非忍不克此理最微故偈曰得勝忍不失以得無垢果言無我之後而得勝真勝也真勝不著一邊此時以忍力持之而不失便是佛果成就其福德自然勝諸菩薩矣此即儒家至誠無息久則徵之候在此經為金剛般若之真詮一部全經之舍利乃特於如來法盡處出之千里來龍結穴在此不受福德無福德相也又以不應貪著拴定而福德多意自在言外蓋已成菩薩者瞋癡易絶唯貪難免有取有得皆貪也故亦以財寶較勝而又單提貪著戒之綿裏細針用意深矣右說經之六章言如來無相亦非無相也二十四斷化身出現受福疑須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來二十五斷法身化身一異疑須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊何以故若是微塵衆實有者佛則不說是微塵衆所以者何佛說微塵衆則非微塵衆是名微塵衆世尊如來所說三千大千世界則非世界是名世界何以故若世界實有者則是一合相如來說一合相則非一合相是名一合相須菩提一合相者則是不可說但凡夫之人貪著其事著音灼此一節言佛不可以相求也上既明如來無相非斷滅相矣故此以下又言佛無相亦非斷滅四相之見者以同歸非相之相如來即佛至此才顯去來坐臥亦就現在言蓋現在去來坐臥乃色身事色身乃如來之應化而非如來之法身也如來法身實無去來故偈曰去來化身佛如來常不動然佛既是如來化身則實在法界中其身雖與如來不一却亦不異矣故偈曰於是法界處非一亦不異然此二句意非經文所有乃彌勒恐人疑佛實與如來有異故特為補出要之佛雖不自言亦意中語也世界碎為微塵喻言以法身為化身也故集解曰界喻真身塵喻化身非微塵是名微塵非世界是名世界猶云非化身是名化身非法身是名法身蓋佛法惟心微塵世界皆五陰和合而成非心所有微塵世界既空則法身與化身又何在故能不作世界相乃是真法界方得見如來意謂衆生疑佛有去來皆因以世界碎為微塵之見耳若能知世界非世界微塵非微塵則能空相能知夫去來非去來而佛之真相有在矣一合相猶云是和合相蓋至此佛乃顯然以如來自認而明告彼衆生不可著去來之相認如來此又以世界並微塵實法證之則佛真無我相矣故此節與前不可以相觀如來節對照看自然結搆也須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見衆生見壽者見則非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相此一節言佛雖無法相而又非實無衆生等斷滅見者亦無非法相意也見字與相字不同相就觸言見就性言因前章言不可說一合相恐人疑佛於四相斷滅不知佛正以非四相為四相故能度衆生而成佛如楞嚴所謂五陰本如來藏妙真如性若必欲斷滅四相之見舍四相外又何佛性故曰是名我見人見衆生見壽者見此意實與莫作斷滅相對照如是知知無法無非法也如是見見無法無非法也如是信解信解如是無法無非法也然文雖單結佛法而義實兼三世故與過去心不可得現在心不可得未來心不可得相應正見佛與如來不一不二衆生與佛平等無高下所謂三世如來之實法也佛說至此八罌舍利和盤托出矣然猶恐人偏執邊見乃又以不生法相繳定空相而又以非法相是名法相還出真相文義雙精理法兼到遠有遠照近有近應虗有虗脉實有實線散之則頭頭是道合之則究竟一源粗之則節節斷續精之則首尾一貫真天地之至文神靈之奇筆也二十六斷化身說法無福疑須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩薩心者結完十七分現在菩薩之問持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動二十七斷入寂如何說法疑何以故一切有為法如夢幻泡影如露亦如電應作如是觀此一節言佛法究竟之果報而因以古偈結出全經實法也三世佛法徹上徹下故以無量阿僧祇布施較勝阿僧祗劫世無數菩薩心指前章真是菩薩之心云何福德之多蓋以真如空相之人演真如空相之法故耳如如一如真常之性有者有之無者無之毫不造作純然真靜心靜則慧性靜則得所謂定水澄清心珠自現蓋真能具此法者然後能演此法福德之多不亦宜乎即中庸所謂苟不固聰明睿知達天德者其孰能知之意故偈曰化身示現福非無無盡福諸佛說法時不言是化身言必有法身而後可以說法也一切有為法言一切有相之法只對前皆以無為法而有差別無為兩字反照便得凡滅度衆生不住布施信心持誦第一忍辱無我無法一切善法生心成忍知見信解皆是但一住相便非做盡許多事業只不住相方是無為之為即無相之相矣夢幻泡影露電六事皆空相也然皆非無體之空皆自有為而入空如夢非感不成幻非術不顯泡無水不起影無質不現露無天氣不降電無地氣不升皆自有而入無自有為以至無為二義雙成實佛法全體故偈曰非有為非離言雖非有為而亦不離有為也又曰諸如來涅槃九種有為法妙智正觀故言自古如來涅槃之法皆從此九種有為中以妙智正觀而得也妙智正觀正是從有為中看出無為而得真常實相也又彌勒偈見相及於識八句是總釋古偈之義以結全經之宗旨也見相凡所有相識分別相器身形質之身言分別有相即如此九種之相皆形質受用之事而非真相若能知此便是正觀遂將此正觀之法觀于三世皆如此九種之非真相則於有為法中而得無為自在之真相所謂無垢法也無垢即是清淨無相此八句實總結全經三世一法之義右說經之七章言佛無法相亦無非法相遂言古偈以結之而如來實法見矣愚按法身非相以下七分明明以如來與佛兩並雙收顯出合一之義故豫分為二章以見佛與如來同歸實法四句偈即諸相非相之體而能作如是觀者即見如來首尾相應實理如是文義如是舊說將有為法三字看壞注謂衆生界內造作遷流但以一空字了之不見佛法全體故不知此偈之妙不知本文明有法字彌勒偈又添出中字得字何等明白陳真諦譯本於如如不動下曰恆有正說應觀有為法如暗翳燈幻露泡夢電雲所謂恆有正說豈非自古相傳之成說乎應觀有為法豈非即指全經諸法乎此豫所謂一部金經只闡得此偈宗旨非敢臆說也流通佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行流通分亦道安所定優婆塞優婆夷謂在俗男女能敬奉三寶受持五戒者一離殺生二離不與取三離邪淫四離妄語五離飲酒謂之優婆戒
